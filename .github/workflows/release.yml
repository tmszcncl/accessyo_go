name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist build

          build_unix() {
            local os="$1"
            local arch="$2"
            local outdir="build/${os}-${arch}"
            mkdir -p "$outdir"

            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "$outdir/accessyo" ./cmd/accessyo
            tar -C "$outdir" -czf "dist/accessyo_${VERSION}_${os}_${arch}.tar.gz" accessyo
          }

          build_windows() {
            local arch="$1"
            local outdir="build/windows-${arch}"
            mkdir -p "$outdir"

            CGO_ENABLED=0 GOOS=windows GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "$outdir/accessyo.exe" ./cmd/accessyo
            (
              cd "$outdir"
              zip -q "../../dist/accessyo_${VERSION}_windows_${arch}.zip" accessyo.exe
            )
          }

          build_unix linux amd64
          build_unix linux arm64
          build_unix darwin amd64
          build_unix darwin arm64
          build_windows amd64
          build_windows arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
